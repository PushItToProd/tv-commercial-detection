<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="vendor/bootstrap.min.css">
  <style>
    body { width: 340px; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #adb5bd; transition: background 0.3s;
    }
    .status-dot.active {
      background: #198754;
      box-shadow: 0 0 6px #198754;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    .entry.ok  { color: #198754; }
    .entry.err { color: #dc3545; }
    #btn-toggle.running { background-color: #dc3545 !important; border-color: #dc3545 !important; color: #fff !important; }
    #btn-toggle.running:hover { background-color: #bb2d3b !important; border-color: #b02a37 !important; }
  </style>
</head>
<body>

<header class="d-flex align-items-center gap-2 p-3 border-bottom">
  <div class="d-flex align-items-center justify-content-center rounded bg-success text-white" style="width:28px;height:28px;font-size:14px;">⬡</div>
  <span class="fw-semibold text-uppercase small" style="letter-spacing:0.08em;">Frame Capture</span>
  <div class="status-dot ms-auto" id="status-dot"></div>
</header>

<div class="p-3 d-flex flex-column gap-3">

  <!-- Interval -->
  <div class="d-flex align-items-center gap-2">
    <label class="form-label mb-0 text-muted small text-uppercase" for="interval">Interval</label>
    <input type="number" class="form-control form-control-sm" id="interval" min="1" max="3600" value="10" style="width:72px;">
    <span class="text-muted small">sec</span>
  </div>

  <!-- Endpoints -->
  <div>
    <div class="small text-muted text-uppercase mb-2">POST endpoints</div>
    <div id="endpoints-list" class="d-flex flex-column gap-2"></div>
    <button class="btn btn-sm btn-outline-secondary mt-2" id="btn-add">+ add endpoint</button>
  </div>

  <!-- Actions -->
  <div class="d-flex gap-2">
    <button class="btn btn-sm btn-outline-secondary flex-fill" id="btn-save">Save</button>
    <button class="btn btn-sm btn-primary flex-fill" id="btn-toggle" style="flex:2;">Start</button>
  </div>

  <!-- Log -->
  <div id="log" class="border rounded p-2 font-monospace small text-muted overflow-y-auto" style="height:72px;line-height:1.6;">
    <span class="text-secondary">// activity log</span>
  </div>

</div>

<footer class="border-top px-3 py-2 text-center text-muted small">
  tab-frame-capture · v2.0
</footer>

<script src="vendor/bootstrap.bundle.min.js"></script>
<script src="popup.js"></script>
</body>
</html>
</html>
