<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ad Detector</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; flex-direction: column; align-items: center;
    padding-top: 5vh;
    height: 100vh; font-family: sans-serif;
    background: #333; transition: background 0.4s;
  }
  #label {
    font-size: 30vh; font-weight: bold; color: #fff;
    text-shadow: 0 4px 24px rgba(0,0,0,0.5);
    letter-spacing: 0.05em;
  }
  #paused-indicator {
    font-size: 6vh; font-weight: bold; color: rgba(255,255,255,0.65);
    letter-spacing: 0.1em; margin-top: 0.5rem; min-height: 1.2em;
  }
  #last-frame {
    position: fixed; bottom: 15vh; right: 1vw;
    max-width: min(480px, 90vw); max-height: 30vh;
    border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    display: none;
  }
  #buttons {
    position: fixed; bottom: 18vh;
    display: flex; gap: 1rem;
  }
  .btn-correction {
    padding: 1rem 2.4rem; font-size: 10rem; font-weight: bold;
    border: none; border-radius: 12px; cursor: pointer;
    background: rgba(255,255,255,0.2); color: #fff;
    /*
      FIXME: The transition property below is commented out until I can figure
      out how to un-focus/un-hover the button on iPadOS. As it is, leaving this
      uncommented causes the button to flash every second when update() is
      called, which is very annoying.
    */
    /* transition: background 0.2s; */
  }
  .btn-correction:hover { background: rgba(255,255,255,0.38); }
  #bottom-controls {
    position: fixed; bottom: 0; left: 0; right: 0;
    display: flex; align-items: center; gap: 1.5rem; padding: 1rem 1.6rem;
    background: rgba(0,0,0,0.4); z-index: 10; flex-wrap: wrap;
  }
  .ctrl-label { font-size: 1.3rem; color: rgba(255,255,255,0.8); white-space: nowrap; }
  .toggle-wrap { display: flex; align-items: center; gap: 0.75rem; }
  .toggle { position: relative; display: inline-block; width: 64px; height: 36px; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider {
    position: absolute; inset: 0; cursor: pointer;
    background: #555; border-radius: 36px; transition: background 0.2s;
  }
  .toggle-slider:before {
    content: ''; position: absolute;
    width: 26px; height: 26px; left: 5px; top: 5px;
    background: #fff; border-radius: 50%; transition: transform 0.2s;
  }
  .toggle input:checked + .toggle-slider { background: #0c6; }
  .toggle input:checked + .toggle-slider:before { transform: translateX(28px); }
  .btn-matrix {
    padding: 0.75rem 1.6rem; font-size: 3rem; font-weight: bold;
    border: 2px solid rgba(255,255,255,0.3); border-radius: 10px; cursor: pointer;
    background: rgba(255,255,255,0.12); color: #fff; transition: background 0.15s;
  }
  .btn-matrix:hover { background: rgba(255,255,255,0.28); }
</style>
</head>
<body>
<div id="bottom-controls">
  <div class="toggle-wrap">
    <label class="toggle"><input type="checkbox" id="auto-switch-toggle" checked><span class="toggle-slider"></span></label>
    <span class="ctrl-label">Auto-switch</span>
  </div>
  <div class="toggle-wrap">
    <label class="toggle"><input type="checkbox" id="enable-debounce-toggle" checked><span class="toggle-slider"></span></label>
    <span class="ctrl-label">Enable Debounce</span>
  </div>
  <button class="btn-matrix" id="btn-ad-input">Input ?</button>
  <button class="btn-matrix" id="btn-race-input">Input ?</button>
</div>
<div id="label">...</div>
<div id="paused-indicator"></div>
<img id="last-frame" src="" alt="last frame">
<div id="buttons"></div>
<script>
function reportWrong(correctLabel) {
  fetch('/report_wrong', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({correct_label: correctLabel})
  })
  .then(r => r.json())
  .then(data => { if (data.error) alert(data.error); })
  .catch(() => {});
}

function updateButtons(c) {
  const div = document.getElementById('buttons');
  div.innerHTML = '';
  if (c === 'ad' || c === 'content') {
    const btn = document.createElement('button');
    btn.className = 'btn-correction';
    btn.textContent = 'Report';
    btn.onclick = () => reportWrong(c === 'ad' ? 'content' : 'ad');
    div.appendChild(btn);
  } else if (c !== null && c !== undefined) {  // FIXME: 'unknown' seemingly gets mapped to null/undefined so this doesn't work how we want
    [['ad', 'Ad'], ['content', 'Racing']].forEach(([lbl, display]) => {
      const btn = document.createElement('button');
      btn.className = 'btn-correction';
      btn.textContent = display;
      btn.onclick = () => reportWrong(lbl);
      div.appendChild(btn);
    });
  }
}

function triggerMatrix(classification) {
  fetch('/trigger_matrix', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({classification})
  }).catch(() => {});
}

document.getElementById('auto-switch-toggle').addEventListener('change', function() {
  fetch('/auto_switch', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({enabled: this.checked})
  }).catch(() => {});
});

document.getElementById('enable-debounce-toggle').addEventListener('change', function() {
  fetch('/enable_debounce', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({enabled: this.checked})
  }).catch(() => {});
});

document.getElementById('btn-ad-input').addEventListener('click', () => triggerMatrix('ad'));
document.getElementById('btn-race-input').addEventListener('click', () => triggerMatrix('content'));

function update() {
  fetch('/is_ad/status')
    .then(r => r.json())
    .then(data => {
      const c = data.classification;
      const paused = data.paused;
      const seeking = data.seeking;
      const el = document.getElementById('label');
      const pausedEl = document.getElementById('paused-indicator');
      if (c === 'ad') {
        document.body.style.background = '#cc0033';
        el.textContent = 'AD';
      } else if (c === 'content') {
        document.body.style.background = '#00882b';
        el.textContent = 'RACING';
      } else {
        document.body.style.background = '#333';
        el.textContent = c === null ? '...' : '?';
      }
      const pending = data.pending;
      pausedEl.textContent = paused ? '⏸ PAUSED' : seeking ? '⏳ SEEKING' : pending ? '⏳ PENDING CHANGE' : '';
      updateButtons(c);
      const frameEl = document.getElementById('last-frame');
      frameEl.src = '/is_ad/last_frame?t=' + Date.now();
      frameEl.style.display = 'block';
      document.getElementById('auto-switch-toggle').checked = data.auto_switch;
      document.getElementById('enable-debounce-toggle').checked = data.enable_debounce;
      if (data.ad_view_label !== undefined)
        document.getElementById('btn-ad-input').textContent = data.ad_view_label;
      if (data.race_view_label !== undefined)
        document.getElementById('btn-race-input').textContent = data.race_view_label;
    })
    .catch(() => {});
}

update();
setInterval(update, 1000);
</script>
</body>
</html>
