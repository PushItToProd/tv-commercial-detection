<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Frame Review</title>
<style>
  body { font-family: sans-serif; background: #1a1a1a; color: #eee; margin: 0; padding: 1rem; }
  h1 { margin-bottom: 0.5rem; }
  #controls { margin-bottom: 1rem; display: flex; align-items: center; gap: 1.2rem; flex-wrap: wrap; }
  #counter { opacity: 0.6; font-size: 0.9rem; }
  .grid { display: flex; flex-wrap: wrap; gap: 1rem; }
  .card {
    background: #2a2a2a; border-radius: 8px; overflow: hidden;
    width: 260px; display: flex; flex-direction: column; border: 2px solid transparent;
  }
  .card.ad      { border-color: #e05; }
  .card.content { border-color: #0a5; }
  .card img { width: 100%; display: block; cursor: zoom-in; }
  .card .info { padding: 0.4rem 0.5rem; font-size: 0.72rem; opacity: 0.6; word-break: break-all; }
  .badge {
    display: inline-block; margin: 0 0.5rem 0.5rem;
    padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.75rem; font-weight: bold;
  }
  .badge.ad      { background: #e05; color: #fff; }
  .badge.content { background: #0a5; color: #fff; }
  .badge.none    { background: #555; color: #ccc; }
  .actions { display: flex; gap: 0.5rem; padding: 0.5rem; }
  .btn {
    flex: 1; padding: 0.4rem; border: none; border-radius: 4px;
    cursor: pointer; font-weight: bold; font-size: 0.85rem; transition: opacity .15s;
  }
  .btn:hover { opacity: 0.75; }
  .btn-ad      { background: #e05; color: #fff; }
  .btn-content { background: #0a5; color: #fff; }
  .features { padding: 0.4rem 0.5rem 0.5rem; display: flex; flex-direction: column; gap: 0.25rem; border-top: 1px solid #3a3a3a; }
  .features label { font-size: 0.72rem; display: flex; align-items: center; gap: 0.4rem; color: #bbb; }
  .features select { flex: 1; background: #333; color: #eee; border: 1px solid #555; border-radius: 3px; padding: 0.1rem 0.2rem; font-size: 0.72rem; }
  /* Step view */
  #step-view { max-width: 960px; margin: 0 auto; }
  #step-nav { display: flex; align-items: center; gap: 0.75rem; margin-bottom: 0.6rem; flex-wrap: wrap; }
  #step-counter { font-size: 0.9rem; opacity: 0.7; min-width: 6rem; text-align: center; }
  #step-filename { font-size: 0.78rem; opacity: 0.55; margin-bottom: 0.5rem; word-break: break-all; }
  #step-img-wrap { position: relative; min-height: 4rem; margin-bottom: 1rem; display: flex; align-items: center; justify-content: center; }
  #step-img { display: block; max-width: 100%; max-height: 62vh; width: auto; height: auto; border-radius: 6px; cursor: zoom-in; background: #111; }
  #step-spinner {
    display: none; position: absolute;
    width: 48px; height: 48px;
    border: 5px solid #444; border-top-color: #aaa;
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #step-img.loading { opacity: 0.15; }
  .step-controls { display: flex; flex-direction: column; gap: 0.55rem; }
  .step-row { display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap; }
  .step-row-label { font-size: 0.78rem; color: #888; min-width: 90px; flex-shrink: 0; }
  .tbtn {
    padding: 0.3rem 0.7rem; border: 2px solid #444; border-radius: 4px;
    background: #252525; color: #aaa; cursor: pointer; font-size: 0.82rem;
    transition: border-color .1s, background .1s, color .1s;
  }
  .tbtn:hover { border-color: #777; color: #eee; }
  .tbtn.active                          { background: #444;  border-color: #aaa; color: #fff; }
  .tbtn.active[data-value="ad"]         { background: #e05;  border-color: #e05; color: #fff; }
  .tbtn.active[data-value="content"]    { background: #0a5;  border-color: #0a5; color: #fff; }
  .tbtn.active[data-value="ignore"]     { background: #555;  border-color: #888; color: #ddd; }
  .nav-btn { padding: 0.35rem 0.9rem; background: #2e2e2e; border: 1px solid #555; color: #ddd; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
  .nav-btn:hover { background: #3a3a3a; }
  .nav-btn:disabled { opacity: 0.3; cursor: default; }
  /* Lightbox */
  #lightbox {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,.85);
    align-items: center; justify-content: center; z-index: 100;
  }
  #lightbox.open { display: flex; }
  #lightbox img { max-width: 95vw; max-height: 92vh; border-radius: 6px; }
  #lightbox-close {
    position: fixed; top: 1rem; right: 1.4rem; font-size: 2rem; cursor: pointer;
    color: #fff; line-height: 1; user-select: none;
  }
</style>
</head>
<body>
<h1>Frame Review</h1>
<div id="controls">
  <label><input type="checkbox" id="hideClassified"> Hide already classified</label>
  <button class="nav-btn" id="toggleView">Step View</button>
  <span id="counter"></span>
</div>
<div class="grid" id="grid"></div>

<div id="step-view" style="display:none">
  <div id="step-nav">
    <button class="nav-btn" id="step-prev">&#8592; Prev</button>
    <span id="step-counter"></span>
    <button class="nav-btn" id="step-next">Next &#8594;</button>
    <button class="nav-btn" id="step-prev-incomplete" title="Previous image missing a label or features">&#8592; Prev incomplete</button>
    <button class="nav-btn" id="step-next-incomplete" title="Next image missing a label or features">Next incomplete &#8594;</button>
    <label style="font-size:0.85rem"><input type="checkbox" id="step-auto-advance"> Auto-advance on label</label>
  </div>
  <div id="step-filename"></div>
  <div id="step-img-wrap">
    <div id="step-spinner"></div>
    <img id="step-img" src="" alt="">
  </div>
  <div class="step-controls" id="step-controls"></div>
</div>

<div id="lightbox">
  <span id="lightbox-close" title="Close">&times;</span>
  <img id="lightbox-img" src="" alt="">
</div>

<script>
// must be kept in sync with VALID_* sets in review.py.
// TODO: load these from an API endpoint to avoid duplication and potential drift.
const FEAT_FIELDS = [
  {field: 'network_logo',        label: 'Logo',       options: ['Fox','FS1','FS2','NBC','CW','USA','other', 'none']},
  {field: 'logo_position',       label: 'Logo pos',   options: ['upper_left','upper_right','lower_left','lower_right','not_visible','unknown']},
  {field: 'scoreboard_position', label: 'Scoreboard', options: ['top','bottom','left','upper_left','right','none','unknown']},
];

const IMAGES = {{ image_data | tojson }};

function updateCounter() {
  const cards = document.querySelectorAll('.card');
  const visible = [...cards].filter(c => c.style.display !== 'none').length;
  document.getElementById('counter').textContent = `${visible} / ${cards.length} shown`;
}

function applyFilter() {
  const hide = document.getElementById('hideClassified').checked;
  document.querySelectorAll('.card').forEach(card => {
    const classified = card.dataset.label && card.dataset.label !== 'null';
    card.style.display = (hide && classified) ? 'none' : '';
  });
  updateCounter();
}

function classifyImage(filename, label, card) {
  fetch('/classify', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({filename, label})
  })
  .then(r => r.json())
  .then(data => {
    if (data.error) { alert(data.error); return; }
    card.dataset.label = label;
    card.className = 'card ' + label;
    const badge = card.querySelector('.badge');
    badge.className = 'badge ' + label;
    badge.textContent = label.toUpperCase();
    applyFilter();
  });
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  document.getElementById('lightbox').classList.add('open');
}

document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget || e.target.id === 'lightbox-close')
    e.currentTarget.classList.remove('open');
});

function saveFeatures(filename, card) {
  const payload = {filename};
  card.querySelectorAll('.feat-select').forEach(sel => {
    payload[sel.dataset.field] = sel.value || null;
  });
  fetch('/features', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  });
}

function buildGrid() {
  const grid = document.getElementById('grid');
  IMAGES.forEach(({filename, label, features}) => {
    const feats = features || {};
    const card = document.createElement('div');
    card.className = 'card' + (label ? ' ' + label : '');
    card.dataset.label = label;
    card.dataset.filename = filename;

    const imgSrc = '/frames/' + encodeURIComponent(filename);

    const img = document.createElement('img');
    img.dataset.src = imgSrc;
    img.title = 'Click to enlarge';
    img.addEventListener('click', () => openLightbox(imgSrc));
    lazyObserver.observe(img);

    const info = document.createElement('div');
    info.className = 'info';
    info.textContent = filename;

    const badge = document.createElement('span');
    badge.className = 'badge ' + (label || 'none');
    badge.textContent = label ? label.toUpperCase() : 'UNCLASSIFIED';

    const actions = document.createElement('div');
    actions.className = 'actions';
    ['ad', 'content', 'ignore'].forEach(lbl => {
      const btn = document.createElement('button');
      btn.className = 'btn btn-' + lbl;
      btn.textContent = lbl.charAt(0).toUpperCase() + lbl.slice(1);
      btn.addEventListener('click', () => classifyImage(filename, lbl, card));
      actions.appendChild(btn);
    });

    const featDiv = document.createElement('div');
    featDiv.className = 'features';
    FEAT_FIELDS.forEach(({field, label: flabel, options}) => {
      const row = document.createElement('label');
      row.textContent = flabel + ': ';
      const sel = document.createElement('select');
      sel.className = 'feat-select';
      sel.dataset.field = field;
      const blank = document.createElement('option');
      blank.value = '';
      blank.textContent = '\u2014';  // em dash = not set
      sel.appendChild(blank);
      options.forEach(opt => {
        const o = document.createElement('option');
        o.value = opt;
        o.textContent = opt.replace(/_/g, ' ');
        if (feats[field] === opt) o.selected = true;
        sel.appendChild(o);
      });
      sel.addEventListener('change', () => saveFeatures(filename, card));
      row.appendChild(sel);
      featDiv.appendChild(row);
    });

    card.append(img, info, badge, actions, featDiv);
    grid.appendChild(card);
  });
  updateCounter();
}

const lazyObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const img = entry.target;
      img.src = img.dataset.src;
      lazyObserver.unobserve(img);
    }
  });
}, { rootMargin: '400px' });

document.getElementById('hideClassified').addEventListener('change', applyFilter);
buildGrid();

// ── Step View ────────────────────────────────────────────────────────────────

let stepIndex = 0;
let inStepView = false;
let stepControlsBuilt = false;

function buildStepControls() {
  if (stepControlsBuilt) return;
  stepControlsBuilt = true;
  const container = document.getElementById('step-controls');

  // Label row
  const labelRow = document.createElement('div');
  labelRow.className = 'step-row';
  const labelTitle = document.createElement('span');
  labelTitle.className = 'step-row-label';
  labelTitle.textContent = 'Label:';
  labelRow.appendChild(labelTitle);
  ['ad', 'content', 'ignore'].forEach(lbl => {
    const btn = document.createElement('button');
    btn.className = 'tbtn';
    btn.dataset.group = 'label';
    btn.dataset.value = lbl;
    btn.textContent = lbl.charAt(0).toUpperCase() + lbl.slice(1);
    labelRow.appendChild(btn);
  });
  container.appendChild(labelRow);

  // Feature rows
  FEAT_FIELDS.forEach(({field, label, options}) => {
    const row = document.createElement('div');
    row.className = 'step-row';
    const title = document.createElement('span');
    title.className = 'step-row-label';
    title.textContent = label + ':';
    row.appendChild(title);
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'tbtn';
      btn.dataset.group = field;
      btn.dataset.value = opt;
      btn.textContent = opt.replace(/_/g, '\u00a0'); // non-breaking space keeps short labels together
      row.appendChild(btn);
    });
    container.appendChild(row);
  });

  // Single click handler via event delegation
  container.addEventListener('click', e => {
    const btn = e.target.closest('.tbtn');
    if (!btn) return;
    const group = btn.dataset.group;
    const value = btn.dataset.value;
    const item = IMAGES[stepIndex];
    const wasActive = btn.classList.contains('active');
    const newValue = wasActive ? null : value;

    if (group === 'label') {
      item.label = newValue;
      // sync grid card
      const card = document.querySelector(`.card[data-filename="${CSS.escape(item.filename)}"]`);
      if (card) {
        card.dataset.label = newValue || '';
        card.className = 'card' + (newValue ? ' ' + newValue : '');
        const badge = card.querySelector('.badge');
        if (badge) {
          badge.className = 'badge ' + (newValue || 'none');
          badge.textContent = newValue ? newValue.toUpperCase() : 'UNCLASSIFIED';
        }
      }
      if (newValue) {
        fetch('/classify', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({filename: item.filename, label: newValue})});
        if (document.getElementById('step-auto-advance').checked) {
          setTimeout(() => navigateStep(1), 150);
          return; // skip updateStepButtons since we're navigating away
        }
      }
    } else {
      if (!item.features) item.features = {};
      item.features[group] = newValue;
      fetch('/features', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          filename: item.filename,
          network_logo: item.features.network_logo ?? null,
          logo_position: item.features.logo_position ?? null,
          scoreboard_position: item.features.scoreboard_position ?? null,
        }),
      });
    }
    updateStepButtons();
  });
}

function updateStepButtons() {
  const item = IMAGES[stepIndex];
  const feats = item.features || {};
  document.querySelectorAll('#step-controls .tbtn').forEach(btn => {
    const current = btn.dataset.group === 'label' ? item.label : feats[btn.dataset.group];
    btn.classList.toggle('active', current === btn.dataset.value);
  });
  document.getElementById('step-prev-incomplete').disabled = findIncomplete(-1) === -1;
  document.getElementById('step-next-incomplete').disabled = findIncomplete(1) === -1;
}

function showSpinner() {
  const img = document.getElementById('step-img');
  img.classList.add('loading');
  document.getElementById('step-spinner').style.display = '';
}

function hideSpinner() {
  const img = document.getElementById('step-img');
  img.classList.remove('loading');
  document.getElementById('step-spinner').style.display = 'none';
}

function renderStep(index) {
  stepIndex = index;
  const item = IMAGES[index];
  showSpinner();
  document.getElementById('step-img').src = '/frames/full/' + encodeURIComponent(item.filename);
  document.getElementById('step-filename').textContent = item.filename;
  document.getElementById('step-counter').textContent = `${index + 1} / ${IMAGES.length}`;
  document.getElementById('step-prev').disabled = index === 0;
  document.getElementById('step-next').disabled = index === IMAGES.length - 1;
  document.getElementById('step-prev-incomplete').disabled = findIncomplete(-1) === -1;
  document.getElementById('step-next-incomplete').disabled = findIncomplete(1) === -1;
  updateStepButtons();
}

function isIncomplete(item) {
  const feats = item.features || {};
  return !item.label
    || !feats.network_logo
    || !feats.logo_position
    || !feats.scoreboard_position;
}

// Returns the index of the nearest incomplete image in direction (+1 or -1),
// or -1 if none exists.
function findIncomplete(dir) {
  let i = stepIndex + dir;
  while (i >= 0 && i < IMAGES.length) {
    if (isIncomplete(IMAGES[i])) return i;
    i += dir;
  }
  return -1;
}

function navigateStep(delta) {
  const next = stepIndex + delta;
  if (next >= 0 && next < IMAGES.length) renderStep(next);
}

document.getElementById('step-prev').addEventListener('click', () => navigateStep(-1));
document.getElementById('step-next').addEventListener('click', () => navigateStep(1));
document.getElementById('step-prev-incomplete').addEventListener('click', () => { const i = findIncomplete(-1); if (i !== -1) renderStep(i); });
document.getElementById('step-next-incomplete').addEventListener('click', () => { const i = findIncomplete(1);  if (i !== -1) renderStep(i); });

const stepImgEl = document.getElementById('step-img');
stepImgEl.addEventListener('load',  hideSpinner);
stepImgEl.addEventListener('error', hideSpinner);
stepImgEl.addEventListener('click', () => {
  openLightbox('/frames/full/' + encodeURIComponent(IMAGES[stepIndex].filename));
});

document.addEventListener('keydown', e => {
  if (!inStepView || e.target.tagName === 'INPUT') return;
  if      (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); navigateStep(1); }
  else if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); navigateStep(-1); }
  else if (e.key === 'a' || e.key === 'A') document.querySelector('#step-controls .tbtn[data-group="label"][data-value="ad"]')?.click();
  else if (e.key === 'c' || e.key === 'C') document.querySelector('#step-controls .tbtn[data-group="label"][data-value="content"]')?.click();
  else if (e.key === 'i' || e.key === 'I') document.querySelector('#step-controls .tbtn[data-group="label"][data-value="ignore"]')?.click();
});

document.getElementById('toggleView').addEventListener('click', () => {
  inStepView = !inStepView;
  document.getElementById('grid').style.display = inStepView ? 'none' : '';
  document.getElementById('step-view').style.display = inStepView ? '' : 'none';
  document.getElementById('hideClassified').closest('label').style.display = inStepView ? 'none' : '';
  document.getElementById('toggleView').textContent = inStepView ? 'Grid View' : 'Step View';
  if (inStepView) {
    buildStepControls();
    renderStep(stepIndex);
  }
});
</script>
</body>
</html>
