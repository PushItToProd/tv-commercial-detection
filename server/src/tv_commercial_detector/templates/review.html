<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Frame Review</title>
<link rel="stylesheet" href="/static/bootstrap.min.css">
<style>
  /* Card border color-coding by classification */
  .card.ad      { border-color: #d63384 !important; border-width: 2px !important; }
  .card.content { border-color: #198754 !important; border-width: 2px !important; }
  /* Step view image */
  #step-img { display: block; max-width: 100%; max-height: 62vh; width: auto; height: auto; border-radius: 6px; cursor: zoom-in; }
  #step-img.loading { opacity: 0.15; }
  /* Toggle buttons active states */
  .tbtn.active[data-value="ad"]      { background: #d63384 !important; border-color: #d63384 !important; color: #fff !important; }
  .tbtn.active[data-value="content"] { background: #198754 !important; border-color: #198754 !important; color: #fff !important; }
  .tbtn.active[data-value="ignore"]  { background: #6c757d !important; border-color: #6c757d !important; color: #fff !important; }
  .tbtn.active { background: #495057 !important; border-color: #adb5bd !important; color: #fff !important; }
</style>
</head>
<body class="bg-light">
<div class="container-fluid py-3">
  <h1 class="h3 mb-3">Frame Review</h1>

  <div id="controls" class="d-flex align-items-center gap-3 flex-wrap mb-3">
    <div class="form-check mb-0">
      <input class="form-check-input" type="checkbox" id="hideClassified">
      <label class="form-check-label" for="hideClassified">Hide already classified</label>
    </div>
    <button class="btn btn-outline-secondary btn-sm" id="toggleView">Step View</button>
    <span id="counter" class="text-muted small"></span>
  </div>

  <!-- Grid view -->
  <div class="d-flex flex-wrap gap-3" id="grid"></div>

  <!-- Step view -->
  <div id="step-view" class="d-none" style="max-width:960px;margin:0 auto;">
    <div id="step-nav" class="d-flex align-items-center flex-wrap gap-2 mb-2">
      <button class="btn btn-outline-secondary btn-sm" id="step-prev">&#8592; Prev</button>
      <span id="step-counter" class="text-muted small text-center" style="min-width:6rem;"></span>
      <button class="btn btn-outline-secondary btn-sm" id="step-next">Next &#8594;</button>
      <button class="btn btn-outline-secondary btn-sm" id="step-prev-incomplete" title="Previous image missing a label or features">&#8592; Prev incomplete</button>
      <button class="btn btn-outline-secondary btn-sm" id="step-next-incomplete" title="Next image missing a label or features">Next incomplete &#8594;</button>
      <div class="form-check mb-0">
        <input class="form-check-input" type="checkbox" id="step-auto-advance">
        <label class="form-check-label small" for="step-auto-advance">Auto-advance on label</label>
      </div>
    </div>
    <div id="step-filename" class="text-muted small mb-2" style="word-break:break-all;"></div>
    <div id="step-img-wrap" class="position-relative d-flex align-items-center justify-content-center mb-3" style="min-height:4rem;">
      <div id="step-spinner" class="spinner-border d-none position-absolute" role="status"><span class="visually-hidden">Loading...</span></div>
      <img id="step-img" src="" alt="">
    </div>
    <div class="d-flex flex-column gap-2" id="step-controls"></div>
  </div>
</div>

<!-- Lightbox modal -->
<div class="modal fade" id="lightbox" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered" style="max-width:95vw;">
    <div class="modal-content bg-transparent border-0">
      <img id="lightbox-img" src="" alt="" class="img-fluid rounded">
    </div>
  </div>
</div>

<script>
// must be kept in sync with VALID_* sets in review.py.
// TODO: load these from an API endpoint to avoid duplication and potential drift.
const FEAT_FIELDS = [
  {field: 'network_logo',        label: 'Logo',       options: ['Fox','FS1','FS2','NBC','CW','USA','other', 'none']},
  {field: 'logo_position',       label: 'Logo pos',   options: ['upper_left','upper_right','lower_left','lower_right','not_visible','unknown']},
  {field: 'scoreboard_position', label: 'Scoreboard', options: ['top','bottom','left','upper_left','right','none','unknown']},
];

const IMAGES = {{ image_data | tojson }};

function updateCounter() {
  const cards = document.querySelectorAll('.card');
  const visible = [...cards].filter(c => !c.classList.contains('d-none')).length;
  document.getElementById('counter').textContent = `${visible} / ${cards.length} shown`;
}

function applyFilter() {
  const hide = document.getElementById('hideClassified').checked;
  document.querySelectorAll('.card').forEach(card => {
    const classified = card.dataset.label && card.dataset.label !== 'null';
    card.classList.toggle('d-none', !!(hide && classified));
  });
  updateCounter();
}

function classifyImage(filename, label, card) {
  fetch('/classify', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({filename, label})
  })
  .then(r => r.json())
  .then(data => {
    if (data.error) { alert(data.error); return; }
    card.dataset.label = label;
    card.className = 'card border ' + label;
    const badge = card.querySelector('.img-badge');
    badge.className = 'img-badge badge ' + (label === 'ad' ? 'bg-danger' : label === 'content' ? 'bg-success' : 'bg-secondary');
    badge.textContent = label.toUpperCase();
    applyFilter();
  });
}

function openLightbox(src) {
  document.getElementById('lightbox-img').src = src;
  const modal = new bootstrap.Modal(document.getElementById('lightbox'));
  modal.show();
}

document.getElementById('lightbox').addEventListener('click', e => {
  if (e.target === e.currentTarget || e.target.classList.contains('modal-content') || e.target.classList.contains('modal-dialog'))
    bootstrap.Modal.getInstance(document.getElementById('lightbox'))?.hide();
});

function saveFeatures(filename, card) {
  const payload = {filename};
  card.querySelectorAll('.feat-select').forEach(sel => {
    payload[sel.dataset.field] = sel.value || null;
  });
  fetch('/features', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify(payload)
  });
}

function buildGrid() {
  const grid = document.getElementById('grid');
  IMAGES.forEach(({filename, label, features}, index) => {
    const feats = features || {};
    const card = document.createElement('div');
    card.className = 'card border ' + (label ? label : '');
    card.style.width = '260px';
    card.dataset.label = label;
    card.dataset.filename = filename;

    const imgSrc = '/frames/' + encodeURIComponent(filename);

    const img = document.createElement('img');
    img.className = 'card-img-top';
    img.style.cursor = 'zoom-in';
    img.dataset.src = imgSrc;
    img.title = 'Click to open in Step View';
    img.addEventListener('click', () => enterStepView(index));
    lazyObserver.observe(img);

    const cardBody = document.createElement('div');
    cardBody.className = 'card-body p-2';

    const info = document.createElement('div');
    info.className = 'small text-muted mb-1';
    info.style.wordBreak = 'break-all';
    info.textContent = filename;

    const badge = document.createElement('span');
    badge.className = 'img-badge badge ' + (label === 'ad' ? 'bg-danger' : label === 'content' ? 'bg-success' : 'bg-secondary');
    badge.textContent = label ? label.toUpperCase() : 'UNCLASSIFIED';

    const actions = document.createElement('div');
    actions.className = 'd-flex gap-1 mt-2';
    [{lbl:'ad',cls:'btn-danger'},{lbl:'content',cls:'btn-success'},{lbl:'ignore',cls:'btn-secondary'}].forEach(({lbl,cls}) => {
      const btn = document.createElement('button');
      btn.className = 'btn btn-sm ' + cls + ' flex-fill';
      btn.textContent = lbl.charAt(0).toUpperCase() + lbl.slice(1);
      btn.addEventListener('click', () => classifyImage(filename, lbl, card));
      actions.appendChild(btn);
    });

    const featDiv = document.createElement('div');
    featDiv.className = 'mt-2 border-top pt-2 d-flex flex-column gap-1';
    FEAT_FIELDS.forEach(({field, label: flabel, options}) => {
      const row = document.createElement('label');
      row.className = 'd-flex align-items-center gap-1 small text-secondary';
      row.textContent = flabel + ': ';
      const sel = document.createElement('select');
      sel.className = 'form-select form-select-sm feat-select flex-fill';
      sel.dataset.field = field;
      const blank = document.createElement('option');
      blank.value = '';
      blank.textContent = '\u2014';  // em dash = not set
      sel.appendChild(blank);
      options.forEach(opt => {
        const o = document.createElement('option');
        o.value = opt;
        o.textContent = opt.replace(/_/g, ' ');
        if (feats[field] === opt) o.selected = true;
        sel.appendChild(o);
      });
      sel.addEventListener('change', () => saveFeatures(filename, card));
      row.appendChild(sel);
      featDiv.appendChild(row);
    });

    cardBody.append(info, badge, actions, featDiv);
    card.append(img, cardBody);
    grid.appendChild(card);
  });
  updateCounter();
}

const lazyObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      const img = entry.target;
      img.src = img.dataset.src;
      lazyObserver.unobserve(img);
    }
  });
}, { rootMargin: '400px' });

document.getElementById('hideClassified').addEventListener('change', applyFilter);
buildGrid();

// ── Step View ────────────────────────────────────────────────────────────────

let stepIndex = 0;
let inStepView = false;
let stepControlsBuilt = false;

function buildStepControls() {
  if (stepControlsBuilt) return;
  stepControlsBuilt = true;
  const container = document.getElementById('step-controls');

  // Label row
  const labelRow = document.createElement('div');
  labelRow.className = 'd-flex align-items-center gap-2 flex-wrap';
  const labelTitle = document.createElement('span');
  labelTitle.className = 'text-muted small';
  labelTitle.style.minWidth = '90px';
  labelTitle.textContent = 'Label:';
  labelRow.appendChild(labelTitle);
  ['ad', 'content', 'ignore'].forEach(lbl => {
    const btn = document.createElement('button');
    btn.className = 'btn btn-sm btn-outline-secondary tbtn';
    btn.dataset.group = 'label';
    btn.dataset.value = lbl;
    btn.textContent = lbl.charAt(0).toUpperCase() + lbl.slice(1);
    labelRow.appendChild(btn);
  });
  container.appendChild(labelRow);

  // Feature rows
  FEAT_FIELDS.forEach(({field, label, options}) => {
    const row = document.createElement('div');
    row.className = 'd-flex align-items-center gap-2 flex-wrap';
    const title = document.createElement('span');
    title.className = 'text-muted small';
    title.style.minWidth = '90px';
    title.textContent = label + ':';
    row.appendChild(title);
    options.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'btn btn-sm btn-outline-secondary tbtn';
      btn.dataset.group = field;
      btn.dataset.value = opt;
      btn.textContent = opt.replace(/_/g, '\u00a0'); // non-breaking space keeps short labels together
      row.appendChild(btn);
    });
    container.appendChild(row);
  });

  // Single click handler via event delegation
  container.addEventListener('click', e => {
    const btn = e.target.closest('.tbtn');
    if (!btn) return;
    const group = btn.dataset.group;
    const value = btn.dataset.value;
    const item = IMAGES[stepIndex];
    const wasActive = btn.classList.contains('active');
    const newValue = wasActive ? null : value;

    if (group === 'label') {
      item.label = newValue;
      // sync grid card
      const card = document.querySelector(`.card[data-filename="${CSS.escape(item.filename)}"]`);
      if (card) {
        card.dataset.label = newValue || '';
        card.className = 'card border' + (newValue ? ' ' + newValue : '');
        const badge = card.querySelector('.img-badge');
        if (badge) {
          badge.className = 'img-badge badge ' + (newValue === 'ad' ? 'bg-danger' : newValue === 'content' ? 'bg-success' : newValue ? 'bg-secondary' : 'bg-secondary');
          badge.textContent = newValue ? newValue.toUpperCase() : 'UNCLASSIFIED';
        }
      }
      if (newValue) {
        fetch('/classify', {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({filename: item.filename, label: newValue})});
        if (document.getElementById('step-auto-advance').checked) {
          setTimeout(() => navigateStep(1), 150);
          return; // skip updateStepButtons since we're navigating away
        }
      }
    } else {
      if (!item.features) item.features = {};
      item.features[group] = newValue;
      fetch('/features', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          filename: item.filename,
          network_logo: item.features.network_logo ?? null,
          logo_position: item.features.logo_position ?? null,
          scoreboard_position: item.features.scoreboard_position ?? null,
        }),
      });
    }
    updateStepButtons();
  });
}

function updateStepButtons() {
  const item = IMAGES[stepIndex];
  const feats = item.features || {};
  document.querySelectorAll('#step-controls .tbtn').forEach(btn => {
    const current = btn.dataset.group === 'label' ? item.label : feats[btn.dataset.group];
    btn.classList.toggle('active', current === btn.dataset.value);
  });
  document.getElementById('step-prev-incomplete').disabled = findIncomplete(-1) === -1;
  document.getElementById('step-next-incomplete').disabled = findIncomplete(1) === -1;
}

function showSpinner() {
  const img = document.getElementById('step-img');
  img.classList.add('loading');
  document.getElementById('step-spinner').classList.remove('d-none');
}

function hideSpinner() {
  const img = document.getElementById('step-img');
  img.classList.remove('loading');
  document.getElementById('step-spinner').classList.add('d-none');
}

function renderStep(index) {
  stepIndex = index;
  const item = IMAGES[index];
  showSpinner();
  // TODO: add an endpoint for partial image compression and use it here to
  // speed up loading times. Full images can be quite large and slow to load,
  // especially on mobile.
  document.getElementById('step-img').src = '/frames/full/' + encodeURIComponent(item.filename);
  document.getElementById('step-filename').textContent = item.filename;
  document.getElementById('step-counter').textContent = `${index + 1} / ${IMAGES.length}`;
  document.getElementById('step-prev').disabled = index === 0;
  document.getElementById('step-next').disabled = index === IMAGES.length - 1;
  document.getElementById('step-prev-incomplete').disabled = findIncomplete(-1) === -1;
  document.getElementById('step-next-incomplete').disabled = findIncomplete(1) === -1;
  updateStepButtons();
}

function isIncomplete(item) {
  const feats = item.features || {};
  return !item.label
    || !feats.network_logo
    || !feats.logo_position
    || !feats.scoreboard_position;
}

// Returns the index of the nearest incomplete image in direction (+1 or -1),
// or -1 if none exists.
function findIncomplete(dir) {
  let i = stepIndex + dir;
  while (i >= 0 && i < IMAGES.length) {
    if (isIncomplete(IMAGES[i])) return i;
    i += dir;
  }
  return -1;
}

function navigateStep(delta) {
  const next = stepIndex + delta;
  if (next >= 0 && next < IMAGES.length) renderStep(next);
}

document.getElementById('step-prev').addEventListener('click', () => navigateStep(-1));
document.getElementById('step-next').addEventListener('click', () => navigateStep(1));
document.getElementById('step-prev-incomplete').addEventListener('click', () => { const i = findIncomplete(-1); if (i !== -1) renderStep(i); });
document.getElementById('step-next-incomplete').addEventListener('click', () => { const i = findIncomplete(1);  if (i !== -1) renderStep(i); });

const stepImgEl = document.getElementById('step-img');
stepImgEl.addEventListener('load',  hideSpinner);
stepImgEl.addEventListener('error', hideSpinner);
stepImgEl.addEventListener('click', () => {
  openLightbox('/frames/full/' + encodeURIComponent(IMAGES[stepIndex].filename));
});

document.addEventListener('keydown', e => {
  if (!inStepView || e.target.tagName === 'INPUT') return;
  if      (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); navigateStep(1); }
  else if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { e.preventDefault(); navigateStep(-1); }
  else if (e.key === 'a' || e.key === 'A') document.querySelector('#step-controls .tbtn[data-group="label"][data-value="ad"]')?.click();
  else if (e.key === 'c' || e.key === 'C') document.querySelector('#step-controls .tbtn[data-group="label"][data-value="content"]')?.click();
  else if (e.key === 'i' || e.key === 'I') document.querySelector('#step-controls .tbtn[data-group="label"][data-value="ignore"]')?.click();
});

function enterStepView(index) {
  inStepView = true;
  document.getElementById('grid').classList.add('d-none');
  document.getElementById('step-view').classList.remove('d-none');
  document.getElementById('hideClassified').closest('.form-check').classList.add('d-none');
  document.getElementById('toggleView').textContent = 'Grid View';
  buildStepControls();
  renderStep(index);
}

document.getElementById('toggleView').addEventListener('click', () => {
  if (inStepView) {
    inStepView = false;
    document.getElementById('grid').classList.remove('d-none');
    document.getElementById('step-view').classList.add('d-none');
    document.getElementById('hideClassified').closest('.form-check').classList.remove('d-none');
    document.getElementById('toggleView').textContent = 'Step View';
  } else {
    enterStepView(stepIndex);
  }
});
</script>
<script src="/static/bootstrap.bundle.min.js"></script>
</body>
</html>
