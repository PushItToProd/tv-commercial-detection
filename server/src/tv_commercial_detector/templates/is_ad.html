<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ad Detector</title>
<link rel="stylesheet" href="/static/bootstrap.min.css">
<style>
  body {
    height: 100vh;
    background: #333; transition: background 0.4s;
    padding-bottom: 5vh;
  }

  .text-mega {
    font-size: clamp(1rem, 20cqw, 20vh);
    font-weight: bold;
    letter-spacing: 0.05em;
  }

  @media(min-width: 1200px) {
    .text-mega {
      font-size: clamp(1rem, 30cqw, 30vh);
    }
  }

  .text-white {
    color: #fff;
  }

  #last-frame {
    max-height: 30vh;
    max-width: 30vw;
    border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    display: none;
  }

  @media(max-width: 992px) {
    #last-frame {
      max-width: 90vw;
    }
  }

  @media(min-width: 1200px) {
    #last-frame {
      max-width: 40vw;
    }
  }

  .btn-correction {
    padding: 1rem 2.4rem;
    font-size: clamp(1rem, 10cqh, 3.5rem);
    font-weight: bold;
    border: none; border-radius: 12px; cursor: pointer;
    background: rgba(255,255,255,0.2); color: #fff;
    /*
      FIXME: The transition property below is commented out until I can figure
      out how to un-focus/un-hover the button on iPadOS. As it is, leaving this
      uncommented causes the button to flash every second when update() is
      called, which is very annoying.
    */
    /* transition: background 0.2s; */
  }
  .btn-correction:hover { background: rgba(255,255,255,0.38); }

</style>
</head>
<body>

  <main class="vstack text-center gap-4" style="width:100%; height: 95vh;">

    <div class="text-center flex-grow-1 text-white">
      <h1 id="label" class="text-mega text-white mb-0">...</h1>
      <div id="classification-reason" class="mt-0 pt-0 fs-3 fst-italic"></div>
      <h2 id="paused-indicator" class="display-2 text-white mb-0 pb-0"></h2>
    </div>

    <div>
      <div class="d-flex flex-column-reverse flex-lg-row text-center align-items-center gap-5 my-5 ms-5 me-5">
        <div class="flex-grow-1">
          <div id="report-buttons" class="d-flex flex-column flex-lg-row align-items-center justify-content-center gap-5"></div>
        </div>
        <div><img id="last-frame" src="" alt="last frame"></div>
      </div>
    </div>

  </main>

  <!-- Fixed bottom control bar -->
  <nav id="bottom-nav" class="navbar bg-dark bg-opacity-75 py-2 px-3">
    <div class="d-flex align-items-center flex-wrap gap-3 w-100">

      <!-- Auto-switch toggle -->
      <div class="form-check form-switch mb-0 d-flex align-items-center gap-2">
        <input class="form-check-input" type="checkbox" role="switch" id="auto-switch-toggle" checked style="width:3rem;height:1.5rem;">
        <label class="form-check-label text-white-50 fw-semibold" for="auto-switch-toggle">Auto-switch</label>
      </div>

      <!-- Auto-switch paused indicator -->
      <div id="auto-switch-paused" class="d-none align-items-center gap-2">
        <span class="text-warning fw-bold">&#9646;&#9646; Paused <span id="pause-seconds">30</span>s</span>
        <button class="btn btn-sm btn-outline-warning" onclick="resumeAutoSwitch()">Re-enable</button>
      </div>

      <!-- Pause auto-switch button (only shown when not already paused) -->
      <button id="btn-pause-auto-switch" class="btn btn-outline-secondary btn-sm fw-semibold" onclick="pauseAutoSwitch()">Pause 30s</button>

      <!-- Enable debounce toggle -->
      <div class="form-check form-switch mb-0 d-flex align-items-center gap-2">
        <input class="form-check-input" type="checkbox" role="switch" id="enable-debounce-toggle" checked style="width:3rem;height:1.5rem;">
        <label class="form-check-label text-white-50 fw-semibold" for="enable-debounce-toggle">Enable Debounce</label>
      </div>

      <!-- Matrix input buttons -->
      <button class="btn btn-outline-light btn-lg fw-bold" id="btn-ad-input">Input ?</button>
      <button class="btn btn-outline-light btn-lg fw-bold" id="btn-race-input">Input ?</button>

      <!-- Classifier profile selector -->
      <div class="d-flex align-items-center gap-2">
        <label class="text-white-50 fw-semibold mb-0" for="classifier-profile-select">Classifier:</label>
        <select class="form-select form-select-sm bg-dark text-light border-secondary" id="classifier-profile-select" style="min-width:10rem;"></select>
      </div>

      <!-- Capture button -->
      <button class="btn btn-outline-light fw-semibold" id="btn-capture" onclick="captureFrames()">Capture</button>

    </div>
  </nav>

<script>
let autoSwitchPausedUntil = null;
let pauseCountdownInterval = null;

function updatePauseCountdown() {
  const el = document.getElementById('auto-switch-paused');
  if (!autoSwitchPausedUntil) {
    el.classList.add('d-none');
    el.classList.remove('d-flex');
    if (pauseCountdownInterval) { clearInterval(pauseCountdownInterval); pauseCountdownInterval = null; }
    return;
  }
  const remaining = Math.ceil(autoSwitchPausedUntil - Date.now() / 1000);
  if (remaining <= 0) {
    autoSwitchPausedUntil = null;
    el.classList.add('d-none');
    el.classList.remove('d-flex');
    if (pauseCountdownInterval) { clearInterval(pauseCountdownInterval); pauseCountdownInterval = null; }
    return;
  }
  el.classList.remove('d-none');
  el.classList.add('d-flex');
  document.getElementById('pause-seconds').textContent = remaining;
}

function resumeAutoSwitch() {
  fetch('/settings/resume_auto_switch', { method: 'POST' }).catch(() => {});
}

function pauseAutoSwitch() {
  fetch('/settings/pause_auto_switch', { method: 'POST' }).catch(() => {});
}

function captureFrames() {
  fetch('/capture', { method: 'POST' })
    .then(r => r.json())
    .then(data => { if (data.error) alert(data.error); })
    .catch(() => {});
}

function reportWrong(correctLabel, doSwitch) {
  fetch('/report_wrong', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({correct_label: correctLabel, switch: doSwitch})
  })
  .then(r => r.json())
  .then(data => { if (data.error) alert(data.error); })
  .catch(() => {});
  openFlagModal(correctLabel);
}

function makeReportButtons(correctLabel, display) {
  const div = document.getElementById('report-buttons');
  const btnSwitch = document.createElement('button');
  btnSwitch.className = 'btn-correction';
  btnSwitch.textContent = display + ' + Switch';
  btnSwitch.onclick = () => reportWrong(correctLabel, true);
  div.appendChild(btnSwitch);
  const btnOnly = document.createElement('button');
  btnOnly.className = 'btn-correction';
  btnOnly.textContent = display + ' Only';
  btnOnly.onclick = () => reportWrong(correctLabel, false);
  div.appendChild(btnOnly);
}

function updateButtons(c) {
  const div = document.getElementById('report-buttons');
  div.innerHTML = '';
  if (c === 'ad' || c === 'content') {
    makeReportButtons(c === 'ad' ? 'content' : 'ad', c === 'ad' ? 'Racing' : 'Ad');
  } else if (c !== null && c !== undefined) {  // FIXME: 'unknown' seemingly gets mapped to null/undefined so this doesn't work how we want
    [['ad', 'Ad'], ['content', 'Racing']].forEach(([lbl, display]) => {
      makeReportButtons(lbl, display);
    });
  }
}

function triggerMatrix(classification) {
  fetch('/trigger_matrix', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({classification})
  })
  .catch((e) => {
    /* TODO: show an error if we get one */
    console.error('Failed to trigger matrix', e);
  });
}

document.getElementById('auto-switch-toggle').addEventListener('change', function() {
  fetch('/settings/auto_switch', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({enabled: this.checked})
  }).catch(() => {});
});

document.getElementById('enable-debounce-toggle').addEventListener('change', function() {
  fetch('/settings/enable_debounce', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({enabled: this.checked})
  }).catch(() => {});
});

document.getElementById('btn-ad-input').addEventListener('click', () => triggerMatrix('ad'));
document.getElementById('btn-race-input').addEventListener('click', () => triggerMatrix('content'));

function applyData(data) {
  const c = data.classification;
  const reason = data.classification_reason;
  const paused = data.paused;
  const seeking = data.seeking;
  const el = document.getElementById('label');
  const reasonEl = document.getElementById('classification-reason');
  const pausedEl = document.getElementById('paused-indicator');
  if (c === 'ad') {
    document.body.style.background = '#cc0033';
    el.textContent = 'AD';
  } else if (c === 'content') {
    document.body.style.background = '#00882b';
    el.textContent = 'RACING';
  } else {
    document.body.style.background = '#333';
    el.textContent = c === null ? '...' : '?';
  }
  reasonEl.textContent = reason || '';
  const pending = data.pending;
  pausedEl.textContent = paused ? '⏸ PAUSED' : seeking ? '⏳ SEEKING' : pending ? '⏳ PENDING CHANGE' : '';
  updateButtons(c);
  const frameEl = document.getElementById('last-frame');
  frameEl.src = '/is_ad/last_frame?t=' + Date.now();
  frameEl.style.display = 'block';
  document.getElementById('auto-switch-toggle').checked = data.auto_switch;
  document.getElementById('enable-debounce-toggle').checked = data.enable_debounce;
  if (data.ad_view_label !== undefined)
    document.getElementById('btn-ad-input').textContent = data.ad_view_label;
  if (data.race_view_label !== undefined)
    document.getElementById('btn-race-input').textContent = data.race_view_label;
  const switching = !!data.matrix_switching;
  ['btn-ad-input', 'btn-race-input'].forEach(id => {
    const b = document.getElementById(id);
    b.disabled = switching;
    b.style.opacity = switching ? '0.4' : '';
  });
  autoSwitchPausedUntil = data.auto_switch_paused_until || null;
  if (autoSwitchPausedUntil && !pauseCountdownInterval) {
    pauseCountdownInterval = setInterval(updatePauseCountdown, 500);
  }
  updatePauseCountdown();
  const pauseBtn = document.getElementById('btn-pause-auto-switch');
  if (pauseBtn) pauseBtn.style.display = (data.auto_switch && !autoSwitchPausedUntil) ? '' : 'none';
}

const evtSource = new EventSource('/is_ad/stream');
evtSource.onmessage = function(event) {
  applyData(JSON.parse(event.data));
};

// Classifier profile selector
(function() {
  const sel = document.getElementById('classifier-profile-select');
  fetch('/settings/classifier_profile')
    .then(r => r.json())
    .then(data => {
      data.available.forEach(p => {
        const opt = document.createElement('option');
        opt.value = p;
        opt.textContent = p;
        if (p === data.current) opt.selected = true;
        sel.appendChild(opt);
      });
    })
    .catch(() => {});
  sel.addEventListener('change', function() {
    fetch('/settings/classifier_profile', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({profile: sel.value})
    }).catch(() => {});
  });
})();
</script>

<div id="flag-modal" class="modal fade" tabindex="-1" aria-labelledby="flag-modal-label" aria-hidden="true">
  <div class="modal-dialog modal-xl modal-dialog-centered">
    <div class="modal-content bg-dark text-white">
      <div class="modal-header">
        <h5 class="modal-title" id="flag-modal-label">Flag Misclassified Frames</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div id="flag-frames-grid" class="row g-3"></div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" id="btn-flag-save">Save</button>
      </div>
    </div>
  </div>
</div>

<script src="/static/bootstrap.bundle.min.js"></script>
<script>
const FLAG_BTNS = [
  {value: 'ad',      label: 'Ad',      active: 'btn-danger',    inactive: 'btn-outline-danger'},
  {value: 'content', label: 'Content', active: 'btn-success',   inactive: 'btn-outline-success'},
  {value: 'ignore',  label: 'Ignore',  active: 'btn-secondary', inactive: 'btn-outline-secondary'},
  {value: 'none',    label: 'Skip',    active: 'btn-light',     inactive: 'btn-outline-light'},
];

const FLAG_CARD_BORDER = {
  ad:      'border-danger',
  content: 'border-success',
  ignore:  'border-secondary',
  none:    'border-dark',
};

function setFlagCardLabel(card, label) {
  card.dataset.label = label;
  card.className = 'card bg-dark h-100 flag-card border border-2 ' + (FLAG_CARD_BORDER[label] || 'border-dark');
  card.querySelectorAll('.flag-btn').forEach(btn => {
    const cfg = FLAG_BTNS.find(b => b.value === btn.dataset.value);
    btn.className = 'btn btn-sm flag-btn ' + (btn.dataset.value === label ? cfg.active : cfg.inactive);
  });
}

async function openFlagModal(correctLabel) {
  const resp = await fetch('/recent_frames');
  const data = await resp.json();
  const grid = document.getElementById('flag-frames-grid');
  grid.innerHTML = '';
  for (const frame of data.frames) {
    const col = document.createElement('div');
    col.className = 'col-sm-6 col-md-4 col-lg-3';

    const card = document.createElement('div');
    // initial class set by setFlagCardLabel below
    card.dataset.timestamp = frame.timestamp;

    const img = document.createElement('img');
    img.src = '/recent_frames/' + frame.timestamp + '/image';
    img.className = 'img-fluid rounded-top';
    img.alt = 'frame';

    const footer = document.createElement('div');
    footer.className = 'card-footer p-2';

    const info = document.createElement('div');
    info.className = 'small text-muted mb-2';
    info.textContent = frame.classification ?? '?';

    const btnGroup = document.createElement('div');
    btnGroup.className = 'btn-group w-100 btn-group-sm';
    btnGroup.setAttribute('role', 'group');
    FLAG_BTNS.forEach(({value}) => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.dataset.value = value;
      btn.className = 'btn btn-sm flag-btn'; // styled by setFlagCardLabel
      btn.textContent = FLAG_BTNS.find(b => b.value === value).label;
      btn.addEventListener('click', () => setFlagCardLabel(card, value));
      btnGroup.appendChild(btn);
    });

    footer.appendChild(info);
    footer.appendChild(btnGroup);
    card.appendChild(img);
    card.appendChild(footer);
    col.appendChild(card);
    grid.appendChild(col);

    setFlagCardLabel(card, correctLabel);
  }
  bootstrap.Modal.getOrCreateInstance(document.getElementById('flag-modal')).show();
}

async function submitFlaggedFrames() {
  const frames = [...document.querySelectorAll('.flag-card')]
    .filter(c => c.dataset.label !== 'none')
    .map(c => ({timestamp: c.dataset.timestamp, label: c.dataset.label}));
  if (frames.length === 0) {
    bootstrap.Modal.getInstance(document.getElementById('flag-modal')).hide();
    return;
  }
  try {
    const resp = await fetch('/flag_frames', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({frames})
    });
    if (!resp.ok) {
      const err = await resp.json();
      alert('Error: ' + (err.detail || resp.statusText));
      return;
    }
    bootstrap.Modal.getInstance(document.getElementById('flag-modal')).hide();
  } catch (e) {
    alert('Failed to save: ' + e);
  }
}

document.getElementById('btn-flag-save').addEventListener('click', submitFlaggedFrames);
</script>
</body>
</html>
